name: Generate Pacman Contribution Graph

on:
  schedule:
    - cron: '0 0 * * *'  # 每天UTC时间0点运行
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 明确授予写入权限
    
    steps:
      - uses: actions/checkout@v4  # 升级到v4（解决Node警告）
        with:
          persist-credentials: false  # 临时关闭，后面用token重新认证
      
      - name: Generate Pacman Graph
        uses: cicirello/pacman-contribution-graph@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # 使用内置token
          username: qingkong66qingkong
          width: 800
          height: 300
      
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v4  # 升级到v4
        with:
          target_branch: output
          build_dir: pacman-contribution-graph
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
